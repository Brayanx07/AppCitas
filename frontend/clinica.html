<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica | CitaHN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/clinica.css">
  <style>
    /* ===== CLINICA PAGE (extra styles not in clinica.css) ===== */
    .clinica-page { min-height:100vh; display:flex; flex-direction:column; }
    .clinica-error { display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:80vh; gap:1rem; text-align:center; color:var(--gray-500); padding:2rem; }
    .clinica-error__icon { font-size:4rem; }
    .clinica-error h2 { font-size:1.5rem; color:var(--gray-800); }

    /* Header */
    .clinica-header { background:var(--white); border-bottom:1px solid var(--gray-100); box-shadow:var(--shadow-sm); }
    .clinica-header__inner { display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:1rem 1.25rem; }
    .clinica-header__brand { display:flex; align-items:center; gap:0.875rem; }
    .clinica-header__logo { width:44px; height:44px; border-radius:var(--radius-md); object-fit:cover; }
    .clinica-header__logo-placeholder { width:44px; height:44px; border-radius:var(--radius-md);
      background:var(--blue-600); color:var(--white); font-weight:800; font-size:1.25rem;
      display:flex; align-items:center; justify-content:center; }
    .clinica-header__nombre { font-size:1.1rem; font-weight:800; color:var(--gray-900); line-height:1.2; }
    .clinica-header__ciudad { font-size:0.78rem; color:var(--gray-500); display:flex; align-items:center; gap:0.25rem; margin-top:0.1rem; }
    .clinica-header__actions { display:flex; gap:0.5rem; align-items:center; }

    /* Hero */
    .clinica-hero { background:linear-gradient(135deg,var(--blue-600),var(--blue-800)); color:var(--white); padding:2.5rem 0; }
    .clinica-hero__desc { font-size:1.05rem; max-width:640px; opacity:0.9; line-height:1.7; }
    .clinica-hero__badges { display:flex; gap:0.5rem; flex-wrap:wrap; margin-top:1rem; }

    /* Main */
    .clinica-main { padding:2rem 0 3rem; flex:1; }
    .clinica-section { margin-bottom:2rem; }
    .clinica-section__title { font-size:1.05rem; font-weight:700; color:var(--gray-800);
      display:flex; align-items:center; gap:0.5rem; margin-bottom:1rem; }
    .clinica-cols { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }

    /* Servicios grid */
    .servicios-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:1rem; }
    .servicio-card { background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg);
      padding:1.25rem; display:flex; align-items:center; gap:1rem; transition:all var(--transition);
      box-shadow:var(--shadow-sm); }
    .servicio-card:hover { border-color:var(--blue-300); box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .servicio-card__icon { font-size:2rem; flex-shrink:0; }
    .servicio-card__info { flex:1; min-width:0; }
    .servicio-card__info h3 { font-size:0.95rem; font-weight:700; color:var(--gray-900); }
    .servicio-card__info p { font-size:0.82rem; color:var(--gray-500); margin-top:0.2rem; }
    .servicio-card__meta { display:flex; align-items:center; gap:0.75rem; margin-top:0.5rem; font-size:0.8rem; color:var(--gray-400); }
    .servicio-card__meta span { display:flex; align-items:center; gap:0.25rem; }
    .servicio-card__precio { color:var(--blue-600); font-weight:700; }
    .servicio-card__arrow { color:var(--blue-400); font-size:1.1rem; flex-shrink:0; }

    /* Horarios */
    .horarios-list { padding:0; }
    .horario-row { display:flex; align-items:center; justify-content:space-between;
      padding:0.7rem 1.5rem; border-bottom:1px solid var(--gray-100); font-size:0.875rem; }
    .horario-row:last-child { border-bottom:none; }
    .horario-row__dia { font-weight:600; color:var(--gray-800); }
    .horario-row__horas { color:var(--gray-500); }

    /* Doctores */
    .doctores-list { display:flex; flex-direction:column; gap:0.75rem; }
    .doctor-card { display:flex; align-items:center; gap:0.875rem; padding:1rem 1.25rem;
      background:var(--white); border:1px solid var(--gray-200); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); }
    .doctor-card__avatar { width:40px; height:40px; border-radius:50%; background:var(--blue-100);
      color:var(--blue-700); font-weight:700; font-size:1rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .doctor-card__nombre { font-size:0.9rem; font-weight:700; color:var(--gray-900); }
    .doctor-card__especialidad { font-size:0.8rem; color:var(--gray-500); margin-top:0.1rem; }

    /* Contacto */
    .contacto-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem 2rem; }
    .contacto-item { display:flex; flex-direction:column; gap:0.2rem; }
    .contacto-item__label { font-size:0.75rem; font-weight:600; text-transform:uppercase;
      letter-spacing:0.05em; color:var(--gray-400); }
    .contacto-item a { color:var(--blue-600); }
    .contacto-item a:hover { text-decoration:underline; }
    .contacto-item__wa { color:#25D366 !important; }

    /* Footer */
    .clinica-footer { background:var(--gray-800); color:var(--gray-400); text-align:center; padding:1.25rem; font-size:0.85rem; }
    .clinica-footer strong { color:var(--white); }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
      z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal-box { background:var(--white); border-radius:var(--radius-xl); box-shadow:var(--shadow-lg);
      width:100%; max-width:520px; max-height:90vh; overflow-y:auto; display:flex; flex-direction:column; }
    .modal-header { display:flex; align-items:flex-start; justify-content:space-between;
      padding:1.25rem 1.5rem 0; gap:1rem; position:sticky; top:0; background:var(--white); z-index:1; }
    .modal-title { font-size:1.2rem; font-weight:800; color:var(--gray-900); }
    .modal-subtitle { font-size:0.85rem; color:var(--gray-500); margin-top:0.2rem; }
    .modal-close { background:none; border:none; color:var(--gray-400); font-size:1.1rem; cursor:pointer;
      width:32px; height:32px; border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .modal-close:hover { background:var(--gray-100); color:var(--gray-700); }

    /* Steps */
    .modal-steps { display:flex; align-items:center; gap:0; padding:1rem 1.5rem; overflow-x:auto; }
    .step { display:flex; align-items:center; gap:0.5rem; flex-shrink:0; }
    .step:not(:last-child)::after { content:''; flex:1; height:1px; background:var(--gray-200); width:24px; margin:0 0.25rem; }
    .step__circle { width:24px; height:24px; border-radius:50%; border:2px solid var(--gray-200);
      font-size:0.75rem; font-weight:700; display:flex; align-items:center; justify-content:center;
      background:var(--white); color:var(--gray-400); flex-shrink:0; }
    .step--active .step__circle { border-color:var(--blue-600); background:var(--blue-600); color:var(--white); }
    .step--done .step__circle { border-color:var(--success); background:var(--success); color:var(--white); }
    .step__label { font-size:0.75rem; font-weight:600; color:var(--gray-400); }
    .step--active .step__label { color:var(--blue-700); }
    .step--done .step__label { color:var(--success); }

    /* Modal content/footer */
    .modal-content { padding:1rem 1.5rem; flex:1; }
    .modal-footer { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.5rem;
      border-top:1px solid var(--gray-100); gap:0.5rem; position:sticky; bottom:0; background:var(--white); }
    .modal-hint { font-size:0.875rem; color:var(--gray-500); margin-bottom:1rem; }

    /* Servicio select list */
    .servicio-select-list { display:flex; flex-direction:column; gap:0.5rem; }
    .servicio-option { display:flex; align-items:center; gap:0.875rem; padding:0.875rem 1rem;
      border:1.5px solid var(--gray-200); border-radius:var(--radius-md); background:var(--white);
      cursor:pointer; transition:all var(--transition); width:100%; text-align:left; }
    .servicio-option:hover { border-color:var(--blue-300); background:var(--blue-50); }
    .servicio-option--selected { border-color:var(--blue-500); background:var(--blue-50); }
    .servicio-option__check { width:22px; height:22px; border-radius:50%; border:2px solid var(--gray-300);
      display:flex; align-items:center; justify-content:center; font-size:0.7rem;
      font-weight:700; color:var(--white); flex-shrink:0; }
    .servicio-option--selected .servicio-option__check { background:var(--blue-600); border-color:var(--blue-600); }
    .servicio-option__info { flex:1; }
    .servicio-option__info strong { display:block; font-size:0.9rem; font-weight:700; color:var(--gray-900); }
    .servicio-option__info span { font-size:0.8rem; color:var(--gray-500); }

    /* Slots */
    .slots-section { margin-top:1rem; }
    .slots-label { font-size:0.875rem; font-weight:600; color:var(--gray-700); margin-bottom:0.75rem; }
    .slots-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:0.5rem; }
    .slot-btn { padding:0.5rem; border:1.5px solid var(--gray-200); border-radius:var(--radius-md);
      background:var(--white); font-size:0.85rem; font-weight:600; color:var(--gray-700);
      cursor:pointer; transition:all var(--transition); }
    .slot-btn:hover { border-color:var(--blue-400); color:var(--blue-700); }
    .slot-btn--selected { border-color:var(--blue-600); background:var(--blue-600); color:var(--white); }
    .slots-loading { display:flex; align-items:center; gap:0.75rem; color:var(--gray-500); font-size:0.875rem; padding:1rem 0; }
    .slots-error { font-size:0.875rem; color:var(--danger); padding:0.75rem; background:var(--danger-light); border-radius:var(--radius-md); }

    /* Forms */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-grid .input-group:last-child,
    .form-grid .input-group:nth-child(3) { grid-column:1/-1; }

    /* Resumen */
    .resumen-box { background:var(--gray-50); border:1px solid var(--gray-200);
      border-radius:var(--radius-lg); overflow:hidden; }
    .resumen-row { display:flex; align-items:center; justify-content:space-between;
      padding:0.7rem 1rem; border-bottom:1px solid var(--gray-200); font-size:0.875rem; }
    .resumen-row:last-child { border-bottom:none; }
    .resumen-row span { color:var(--gray-500); }
    .resumen-row strong { color:var(--gray-900); text-align:right; }
    .reserva-error { background:var(--danger-light); color:var(--danger); border-radius:var(--radius-md);
      padding:0.75rem 1rem; font-size:0.875rem; margin-top:0.75rem; }

    /* Éxito */
    .modal-success { text-align:center; padding:1rem 0; }
    .success-icon { font-size:3rem; margin-bottom:0.75rem; }
    .modal-success h3 { font-size:1.3rem; font-weight:800; color:var(--gray-900); margin-bottom:0.5rem; }
    .modal-success p { font-size:0.875rem; color:var(--gray-600); }
    .success-note { font-size:0.8rem; color:var(--gray-400); margin-top:0.75rem; }

    @media (max-width:768px) {
      .clinica-cols { grid-template-columns:1fr; }
      .contacto-grid { grid-template-columns:1fr; }
      .clinica-header__actions .btn-outline { display:none; }
      .slots-grid { grid-template-columns:repeat(3,1fr); }
      .form-grid { grid-template-columns:1fr; }
      .form-grid .input-group:nth-child(3) { grid-column:auto; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;color:var(--gray-400)">
      <div class="spinner"></div>
      <p>Cargando clínica…</p>
    </div>
  </div>
  <script src="/js/clinica.js"></script>
</body>
</html>
