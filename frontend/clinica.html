<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica | CitaHN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ============================
       CLINICA PAGE — ESTILOS
    ============================ */

    /* --- Base --- */
    .clinica-page { min-height:100vh; display:flex; flex-direction:column; }

    /* --- Skeleton / Loading --- */
    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }
    .sk {
      background: linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: var(--radius-md);
    }
    .sk-avatar { width:44px; height:44px; border-radius:var(--radius-md); flex-shrink:0; }
    .sk-text   { height:14px; border-radius:4px; }
    .sk-btn    { width:100px; height:38px; border-radius:var(--radius-md); }
    .sk-card   { border-radius:var(--radius-lg); }
    .skeleton-hero { height:260px; background:linear-gradient(135deg,#c7d9f5,#dbeafe); }
    .skeleton-page { min-height:100vh; }
    .skeleton-page .clinica-header { background:white; border-bottom:1px solid var(--gray-100); }
    .skeleton-page .clinica-header__inner { display:flex; align-items:center; justify-content:space-between; gap:1rem; padding:1rem 1.25rem; max-width:1100px; margin:0 auto; }
    .skeleton-page .clinica-header__brand { display:flex; align-items:center; gap:.875rem; }

    /* --- Animations --- */
    .fade-up { opacity:0; transform:translateY(22px); transition:opacity .55s ease, transform .55s ease; }
    .fade-up.visible { opacity:1; transform:none; }

    /* --- Header --- */
    .clinica-header {
      background: var(--white);
      border-bottom: 1px solid var(--gray-100);
      position: sticky; top:0; z-index:40;
      transition: box-shadow .2s ease;
    }
    .clinica-header.scrolled { box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .clinica-header__inner {
      display: flex; align-items:center; justify-content:space-between;
      gap: 1rem; padding: .875rem 1.25rem; max-width:1100px; margin:0 auto;
    }
    .clinica-header__brand { display:flex; align-items:center; gap:.875rem; }
    .clinica-header__logo { width:42px; height:42px; border-radius:var(--radius-md); object-fit:cover; }
    .clinica-header__logo-placeholder {
      width:42px; height:42px; border-radius:var(--radius-md);
      background:linear-gradient(135deg,var(--blue-600),var(--blue-800));
      color:var(--white); font-weight:800; font-size:1.2rem;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .clinica-header__nombre { font-size:1rem; font-weight:800; color:var(--gray-900); line-height:1.2; }
    .clinica-header__ciudad { font-size:.75rem; color:var(--gray-400); display:flex; align-items:center; gap:.25rem; margin-top:.15rem; }
    .clinica-header__actions { display:flex; gap:.5rem; align-items:center; }
    .btn-icon-only { padding:.6rem !important; }

    /* --- Hero --- */
    .clinica-hero {
      background: linear-gradient(140deg, #0f2d6b 0%, #1d4ed8 55%, #3b82f6 100%);
      position: relative; overflow:hidden; padding: 3.5rem 0 3rem;
    }
    .hero-pattern {
      position:absolute; inset:0; pointer-events:none;
      background-image: radial-gradient(circle at 20% 50%, rgba(255,255,255,.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,.08) 0%, transparent 40%);
    }
    .hero-inner {
      position:relative; display:flex; align-items:center;
      justify-content:space-between; gap:2.5rem; flex-wrap:wrap;
    }
    .hero-text { flex:1; min-width:260px; }
    .hero-badge {
      display:inline-flex; align-items:center; gap:.4rem;
      background:rgba(255,255,255,.15); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.2); color:rgba(255,255,255,.9);
      padding:.3rem .875rem; border-radius:99px; font-size:.78rem; font-weight:600;
      margin-bottom:1rem;
    }
    .hero-nombre {
      font-size:clamp(1.6rem, 4vw, 2.6rem);
      font-weight:800; color:var(--white); line-height:1.15; margin-bottom:.75rem;
    }
    .hero-desc { color:rgba(255,255,255,.82); font-size:1rem; line-height:1.7; margin-bottom:1.5rem; max-width:520px; }
    .hero-actions { display:flex; gap:.75rem; flex-wrap:wrap; }
    .btn-white { background:white; color:var(--blue-700); font-weight:700; box-shadow:0 2px 12px rgba(0,0,0,.1); }
    .btn-white:hover { background:var(--blue-50); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.18); }
    .btn-wa { background:#25D366; color:white; }
    .btn-wa:hover { background:#1db954; transform:translateY(-2px); box-shadow:0 8px 24px rgba(37,211,102,.35); }

    .hero-stats { display:flex; gap:1rem; flex-shrink:0; flex-wrap:wrap; }
    .hero-stat {
      text-align:center; color:white;
      background:rgba(255,255,255,.12); backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.18);
      padding:1rem 1.5rem; border-radius:var(--radius-lg);
      min-width:90px;
    }
    .hero-stat__num { display:block; font-size:2rem; font-weight:800; line-height:1; }
    .hero-stat__label { font-size:.78rem; opacity:.8; margin-top:.25rem; display:block; }

    /* --- Main --- */
    .clinica-main { padding:2.5rem 0 4rem; flex:1; }
    .clinica-section { margin-bottom:2.5rem; }
    .clinica-section__title {
      font-size:1rem; font-weight:700; color:var(--gray-800);
      display:flex; align-items:center; gap:.5rem; margin-bottom:1.1rem;
    }
    .clinica-section__title svg { color:var(--blue-600); }
    .clinica-cols { display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-bottom:2.5rem; }

    /* --- Servicios --- */
    .servicios-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:.875rem;
    }
    .servicio-card {
      background:var(--white); border:1.5px solid var(--gray-200);
      border-left:4px solid var(--blue-500); border-radius:var(--radius-lg);
      padding:1.1rem; display:flex; align-items:center; gap:1rem;
      transition:all .2s ease; box-shadow:var(--shadow-sm);
      cursor:pointer; text-align:left; width:100%;
    }
    .servicio-card:hover {
      border-color:var(--blue-400); border-left-color:var(--blue-600);
      box-shadow:0 8px 24px rgba(37,99,235,.12); transform:translateY(-3px);
    }
    .servicio-card__icon { font-size:1.75rem; flex-shrink:0; transition:transform .2s; line-height:1; }
    .servicio-card:hover .servicio-card__icon { transform:scale(1.15); }
    .servicio-card__info { flex:1; min-width:0; }
    .servicio-card__info h3 { font-size:.9rem; font-weight:700; color:var(--gray-900); margin-bottom:.2rem; }
    .servicio-card__info p { font-size:.8rem; color:var(--gray-500); margin-bottom:.4rem;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .servicio-card__meta { display:flex; align-items:center; gap:.6rem; font-size:.78rem; color:var(--gray-400); }
    .servicio-card__meta span { display:flex; align-items:center; gap:.25rem; }
    .servicio-card__precio { color:var(--blue-600); font-weight:700; font-size:.82rem; }
    .servicio-card__arrow { color:var(--blue-300); font-size:1rem; flex-shrink:0; transition:transform .2s; }
    .servicio-card:hover .servicio-card__arrow { transform:translateX(4px); color:var(--blue-600); }

    /* --- Horarios --- */
    .horarios-list { padding:0; overflow:hidden; }
    .horario-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:.75rem 1.25rem; border-bottom:1px solid var(--gray-100);
      font-size:.875rem; transition:background .15s;
    }
    .horario-row:last-child { border-bottom:none; }
    .horario-row:hover { background:var(--gray-50); }
    .horario-row__dia { font-weight:600; color:var(--gray-800); }
    .horario-row__horas { color:var(--blue-600); font-weight:600; font-size:.82rem;
      background:var(--blue-50); padding:.2rem .6rem; border-radius:99px; }

    /* --- Doctores --- */
    .doctores-list { display:flex; flex-direction:column; gap:.625rem; }
    .doctor-card {
      display:flex; align-items:center; gap:.875rem; padding:.875rem 1.1rem;
      background:var(--white); border:1px solid var(--gray-200);
      border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); transition:all .2s;
    }
    .doctor-card:hover { border-color:var(--blue-200); box-shadow:var(--shadow-md); transform:translateX(4px); }
    .doctor-card__avatar {
      width:42px; height:42px; border-radius:50%;
      background:linear-gradient(135deg,var(--blue-100),var(--blue-200));
      color:var(--blue-700); font-weight:800; font-size:1rem;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .doctor-card__nombre { font-size:.9rem; font-weight:700; color:var(--gray-900); }
    .doctor-card__especialidad { font-size:.78rem; color:var(--gray-500); margin-top:.1rem; }

    /* --- Contacto --- */
    .contacto-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.1rem 2rem; }
    .contacto-item { display:flex; flex-direction:column; gap:.25rem; }
    .contacto-item__label { font-size:.7rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.07em; color:var(--gray-400); }
    .contacto-item a { color:var(--blue-600); transition:color .15s; }
    .contacto-item a:hover { color:var(--blue-800); text-decoration:underline; }

    /* --- Footer --- */
    .clinica-footer {
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:var(--gray-400); text-align:center; padding:2rem 1.25rem;
      font-size:.85rem;
    }
    .clinica-footer strong { color:var(--white); }
    .clinica-footer__sub { font-size:.78rem; opacity:.6; margin-top:.3rem; }

    /* --- WhatsApp float --- */
    .wa-float {
      position:fixed; bottom:1.75rem; right:1.75rem; z-index:50;
      width:58px; height:58px; border-radius:50%;
      background:#25D366; color:white;
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 20px rgba(37,211,102,.45);
      transition:transform .2s ease, box-shadow .2s;
    }
    .wa-float:hover { transform:scale(1.1); box-shadow:0 8px 30px rgba(37,211,102,.55); }
    .wa-float::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      background:rgba(37,211,102,.4);
      animation: wa-pulse 2.2s ease-out infinite;
    }
    @keyframes wa-pulse {
      0%   { transform:scale(1);   opacity:.7; }
      100% { transform:scale(1.9); opacity:0; }
    }

    /* ============================
       MODAL
    ============================ */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      backdrop-filter:blur(6px); z-index:100;
      display:flex; align-items:flex-end; justify-content:center; padding:0;
    }
    @media (min-width:600px) {
      .modal-overlay { align-items:center; padding:1rem; }
    }
    .modal-box {
      background:var(--white); width:100%; max-width:540px;
      max-height:92vh; overflow-y:auto; display:flex; flex-direction:column;
      border-radius:var(--radius-xl) var(--radius-xl) 0 0;
      animation: slideUpModal .28s cubic-bezier(.32,.72,0,1) both;
    }
    @media (min-width:600px) {
      .modal-box { border-radius:var(--radius-xl); animation-name:zoomInModal; }
    }
    @keyframes slideUpModal { from { opacity:0; transform:translateY(48px); } to { opacity:1; transform:none; } }
    @keyframes zoomInModal  { from { opacity:0; transform:scale(.96) translateY(10px); } to { opacity:1; transform:none; } }

    /* Handle bar on mobile */
    .modal-box::before {
      content:''; display:block; width:40px; height:4px;
      background:var(--gray-200); border-radius:99px;
      margin:0.75rem auto 0; flex-shrink:0;
    }
    @media (min-width:600px) { .modal-box::before { display:none; } }

    .modal-header {
      display:flex; align-items:flex-start; justify-content:space-between;
      padding:1rem 1.5rem .5rem; gap:1rem;
    }
    .modal-title { font-size:1.15rem; font-weight:800; color:var(--gray-900); }
    .modal-subtitle { font-size:.82rem; color:var(--gray-500); margin-top:.15rem; }
    .modal-close {
      background:var(--gray-100); border:none; color:var(--gray-500);
      width:32px; height:32px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:.9rem; cursor:pointer; transition:all .15s;
    }
    .modal-close:hover { background:var(--gray-200); color:var(--gray-900); }

    /* Steps */
    .modal-steps {
      display:flex; align-items:center; padding:.875rem 1.5rem .5rem; gap:0;
    }
    .step { display:flex; align-items:center; gap:.4rem; flex-shrink:0; }
    .step-line { flex:1; height:2px; background:var(--gray-200); min-width:20px; position:relative; overflow:hidden; }
    .step-line-fill { position:absolute; inset:0; background:var(--blue-500); transition:width .3s ease; border-radius:99px; }
    .step__circle {
      width:24px; height:24px; border-radius:50%; border:2px solid var(--gray-200);
      font-size:.72rem; font-weight:800; display:flex; align-items:center; justify-content:center;
      background:var(--white); color:var(--gray-400); flex-shrink:0; transition:all .2s;
    }
    .step--active .step__circle { border-color:var(--blue-600); background:var(--blue-600); color:var(--white); }
    .step--done  .step__circle { border-color:var(--success); background:var(--success); color:var(--white); }
    .step__label { font-size:.72rem; font-weight:600; color:var(--gray-400); }
    .step--active .step__label { color:var(--blue-700); }
    .step--done   .step__label { color:var(--success); }

    /* Modal content & footer */
    .modal-content { padding:1rem 1.5rem; flex:1; }
    .modal-footer {
      display:flex; align-items:center; justify-content:space-between;
      padding:.875rem 1.5rem; border-top:1px solid var(--gray-100);
      gap:.5rem; background:var(--white);
      position:sticky; bottom:0;
    }
    .modal-hint { font-size:.875rem; color:var(--gray-500); margin-bottom:1rem; }

    /* Servicio select */
    .servicio-select-list { display:flex; flex-direction:column; gap:.5rem; }
    .servicio-option {
      display:flex; align-items:center; gap:.875rem; padding:.875rem 1rem;
      border:1.5px solid var(--gray-200); border-radius:var(--radius-lg);
      background:var(--white); cursor:pointer; transition:all .18s; width:100%; text-align:left;
    }
    .servicio-option:hover { border-color:var(--blue-300); background:var(--blue-50); }
    .servicio-option--selected { border-color:var(--blue-500); background:var(--blue-50); box-shadow:0 0 0 3px rgba(37,99,235,.08); }
    .servicio-option__icon { font-size:1.5rem; flex-shrink:0; }
    .servicio-option__info { flex:1; }
    .servicio-option__info strong { display:block; font-size:.9rem; font-weight:700; color:var(--gray-900); }
    .servicio-option__info span  { font-size:.8rem; color:var(--gray-500); }
    .servicio-option__check {
      width:22px; height:22px; border-radius:50%; background:var(--blue-600);
      color:white; display:flex; align-items:center; justify-content:center;
      font-size:.7rem; font-weight:800; flex-shrink:0;
    }

    /* Slots */
    .slots-section { margin-top:1.25rem; }
    .slots-label { font-size:.85rem; color:var(--gray-600); margin-bottom:.75rem; }
    .slots-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:.45rem; }
    .slot-btn {
      padding:.5rem .3rem; border:1.5px solid var(--gray-200); border-radius:var(--radius-md);
      background:var(--white); font-size:.83rem; font-weight:600; color:var(--gray-700);
      cursor:pointer; transition:all .15s; text-align:center;
    }
    .slot-btn:hover { border-color:var(--blue-400); color:var(--blue-700); background:var(--blue-50); }
    .slot-btn--selected { border-color:var(--blue-600); background:var(--blue-600); color:var(--white); box-shadow:0 2px 8px rgba(37,99,235,.3); }
    .slots-loading { display:flex; align-items:center; gap:.75rem; color:var(--gray-500); font-size:.875rem; padding:.75rem 0; }
    .slots-error { font-size:.875rem; color:var(--danger); padding:.75rem 1rem; background:var(--danger-light); border-radius:var(--radius-md); }

    /* Form grid */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:.875rem; }

    /* Resumen */
    .resumen-box { background:var(--gray-50); border:1px solid var(--gray-200); border-radius:var(--radius-lg); overflow:hidden; }
    .resumen-row {
      display:flex; align-items:flex-start; justify-content:space-between;
      padding:.65rem 1rem; border-bottom:1px solid var(--gray-200);
      font-size:.875rem; gap:1rem;
    }
    .resumen-row:last-child { border-bottom:none; }
    .resumen-row span { color:var(--gray-500); white-space:nowrap; }
    .resumen-row strong { color:var(--gray-900); text-align:right; }
    .reserva-error {
      background:var(--danger-light); color:var(--danger);
      border-radius:var(--radius-md); padding:.75rem 1rem;
      font-size:.875rem; margin-top:.875rem;
    }

    /* Éxito */
    .modal-success { text-align:center; padding:.5rem 0 1rem; }
    @keyframes successPop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
    .success-anim { font-size:3.5rem; animation:successPop .5s ease both; margin-bottom:.75rem; }
    .modal-success h3 { font-size:1.3rem; font-weight:800; color:var(--gray-900); margin-bottom:.5rem; }
    .modal-success p  { font-size:.875rem; color:var(--gray-600); }
    .success-note { font-size:.8rem; color:var(--gray-400); margin-top:.875rem; }

    /* ============================
       RESPONSIVE
    ============================ */
    @media (max-width:768px) {
      .clinica-cols { grid-template-columns:1fr; gap:1.5rem; }
      .contacto-grid { grid-template-columns:1fr; }
      .hero-stats { display:flex; gap:.75rem; }
      .hero-stat { padding:.75rem 1rem; }
      .hero-stat__num { font-size:1.5rem; }
      .clinica-header__actions .btn-outline { display:none; }
      .slots-grid { grid-template-columns:repeat(3,1fr); }
      .form-grid { grid-template-columns:1fr; }
      .hero-nombre { font-size:1.75rem; }
      .clinica-main { padding:1.5rem 0 3rem; }
      .wa-float { bottom:1rem; right:1rem; width:52px; height:52px; }
    }
    @media (max-width:480px) {
      .servicios-grid { grid-template-columns:1fr; }
      .hero-stats { gap:.5rem; }
      .hero-stat { min-width:72px; padding:.6rem .875rem; }
      .slots-grid { grid-template-columns:repeat(3,1fr); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1rem;color:var(--gray-400)">
      <div class="spinner"></div>
      <p style="font-size:.9rem">Cargando clínica…</p>
    </div>
  </div>
  <script src="/js/clinica.js"></script>
</body>
</html>
