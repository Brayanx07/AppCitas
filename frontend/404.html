<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada | CitaHN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }
    .not-found__icon { font-size: 5rem; }
    .not-found__code { font-size: 5rem; font-weight: 800; color: var(--blue-200); line-height: 1; }
    .not-found h1 { font-size: 1.75rem; font-weight: 800; color: var(--gray-900); }
    .not-found p  { color: var(--gray-500); max-width: 400px; }
    .not-found__actions { display: flex; gap: 0.75rem; margin-top: 0.5rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <div class="not-found">
    <div class="not-found__icon">🏥</div>
    <div class="not-found__code">404</div>
    <h1>Página no encontrada</h1>
    <p>La clínica o página que buscas no existe o el enlace es incorrecto.</p>
    <div class="not-found__actions">
      <button class="btn btn-primary" onclick="history.back()">← Volver</button>
    </div>
  </div>
</body>
</html>
